# ===============================
# Infrastructure (Localhost)
# ===============================
spring.datasource.url=jdbc:postgresql://localhost:5432/booking_ota
# Defaults match docker-compose-dev.yml (Postgres user/pass). Override via env when needed.
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}

spring.data.redis.host=localhost
spring.data.redis.port=6379

spring.kafka.bootstrap-servers=localhost:9092

# OAuth / JWT / VNPay — optional env in dev (Spring does not load repo-root .env automatically)
# google: leave empty if you are not testing Google sign-in locally.
google.client.id=${GOOGLE_CLIENT_ID:}
# jwt: Base64(32 zero bytes) — valid HS256 length for local dev only; override JWT_BASE64_SECRET in env for real use.
jwt.base64-secret=${JWT_BASE64_SECRET:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=}
jwt.access-token-validity-in-seconds=${JWT_ACCESS_TOKEN_VALIDITY_IN_SECONDS:86400}
jwt.refresh-token-validity-in-seconds=${JWT_REFRESH_TOKEN_VALIDITY_IN_SECONDS:604800}
vnpay.tmnCode=${VNPAY_TMN_CODE:dev}
vnpay.hashSecret=${VNPAY_HASH_SECRET:dev}

# Mail
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
app.mail.display-name=KBookin_System_Dev

# MinIO
minio.endpoint=http://localhost:9000
minio.access-key=${MINIO_ACCESS_KEY:admin}
minio.secret-key=${MINIO_SECRET_KEY:password123}
minio.bucket.compliance=kbookin-compliance
minio.bucket.gallery=kbookin-gallery

# VNPay Dev
vnpay.returnUrl=http://localhost:5173/payments/call-back
vnpay.ipnUrl=http://localhost:8080/api/payments/call-back

# Dev Specifics
logging.level.root=INFO
logging.level.com.booking.KBookin=DEBUG